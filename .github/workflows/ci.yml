name: CI

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main, develop]

jobs:
  yaml-lint:
    name: YAML lint (component schemas)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install yamllint
        run: pipx install yamllint

      - name: Lint component schemas
        run: |
          yamllint -d '{extends: default, rules: {line-length: disable, document-start: disable, truthy: {check-keys: false}, indentation: {spaces: 2}}}' components/

      - name: Lint info / config YAML
        run: |
          yamllint -d '{extends: relaxed, rules: {line-length: disable}}' sdc_library.info.yml examples/config/

  stylelint:
    name: Stylelint (component CSS)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Run stylelint
        run: npx stylelint "components/**/*.css"

  prettier:
    name: Prettier (component JS + stories)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Run prettier --check
        run: |
          npx prettier --check "components/**/*.js" "storybook/stories/**/*.js" "storybook/.storybook/**/*.js"

  phpcs:
    name: Drupal coding standards (PHPCS)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: '8.3'
          tools: composer:v2
          coverage: none

      - name: Cache composer
        uses: actions/cache@v4
        with:
          path: ~/.composer/cache
          key: ${{ runner.os }}-composer-${{ hashFiles('composer.json') }}
          restore-keys: ${{ runner.os }}-composer-

      - name: Install Drupal coder + PHPCS
        run: |
          composer global config --no-plugins allow-plugins.dealerdirect/phpcodesniffer-composer-installer true
          composer global config --no-plugins allow-plugins.composer/installers true
          composer global require --no-interaction "drupal/coder:^8.3" "dealerdirect/phpcodesniffer-composer-installer:^1.0"
          echo "${HOME}/.composer/vendor/bin" >> "$GITHUB_PATH"

      - name: Run PHPCS
        run: |
          phpcs --standard=Drupal,DrupalPractice --extensions=php,module,inc,install,test,profile,theme --warning-severity=0 sdc_library.module
